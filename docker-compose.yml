version: "3.9"

services:
  db:
    image: docker.io/library/postgres:16
    environment:
      POSTGRES_DB: lostfound
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lostfound"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      LOSTFOUND_DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/lostfound
      LOSTFOUND_JWT_SECRET_KEY: CHANGE_ME
      LOSTFOUND_AUTO_CREATE_SCHEMA_ON_STARTUP: "false"
      LOSTFOUND_REPAIR_SCHEMA_ON_STARTUP: "false"
    ports:
      - "8000:8000"
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
